info:
  name: get a specific buddy from the current user
  type: http
  seq: 9

http:
  method: GET
  url: "{{BASE_URL}}/users/buddies/:buddyId"
  headers:
    - name: Authorization
      value: Bearer {{JWT_TOKEN}}
  params:
    - name: buddyId
      value: "123456789"
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
