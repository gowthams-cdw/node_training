info:
  name: get all buddies for the current user
  type: http
  seq: 5

http:
  method: GET
  url: "{{BASE_URL}}/users/buddies"
  headers:
    - name: Authorization
      value: Bearer {{JWT_TOKEN}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
