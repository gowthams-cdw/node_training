info:
  name: update a specific buddy copy
  type: http
  seq: 8

http:
  method: PUT
  url: "{{BASE_URL}}/users/buddies/update/:updateBuddyId"
  headers:
    - name: Authorization
      value: Bearer {{JWT_TOKEN}}
  params:
    - name: updateBuddyId
      value: "123456789"
      type: path
  body:
    type: json
    data: |-
      {
        "nickName": "silentFellow"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
